apiVersion: apps/v1
kind: Deployment
metadata:
  name: visits-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: visits-service
  template:
    metadata:
      labels:
        app: visits-service
    spec:
      containers:
        - name: visits-service
          image: ross1832/spring-petclinic-visits-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
