apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customers-service
  template:
    metadata:
      labels:
        app: customers-service
    spec:
      containers:
        - name: customers-service
          image: ross1832/spring-petclinic-customers-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
