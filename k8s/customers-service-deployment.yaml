apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: customers-service
  name: customers-service
  namespace: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customers-service
  template:
    metadata:
      labels:
        app: customers-service
    spec:
      containers:
        - image: springcommunity/spring-petclinic-customers-service
          imagePullPolicy: IfNotPresent
          name: customers-service
          ports:
            - containerPort: 8081
              protocol: TCP
          resources:
            limits:
              memory: "512Mi"
