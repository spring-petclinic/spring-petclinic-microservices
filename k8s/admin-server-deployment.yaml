apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-server
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-server
  template:
    metadata:
      labels:
        app: admin-server
    spec:
      containers:
        - name: admin-server
          image: ross1832/spring-petclinic-admin-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9090
