apiVersion: apps/v1
kind: Deployment
metadata:
  name: vets-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vets-service
  template:
    metadata:
      labels:
        app: vets-service
    spec:
      containers:
        - name: vets-service
          image: ross1832/spring-petclinic-vets-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
