apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: config-server
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: config-server
          image: ross1832/spring-petclinic-config-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8888